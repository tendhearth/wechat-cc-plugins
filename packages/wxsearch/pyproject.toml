[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "wxsearch"
version = "0.1.0"
description = "Local hybrid (semantic+keyword) search over WeChat history for wechat-cc"
requires-python = ">=3.10"
dependencies = ["numpy", "zstandard>=0.22"]

[project.optional-dependencies]
test = ["pytest>=7"]

[tool.setuptools.packages.find]
include = ["wxsearch*"]
